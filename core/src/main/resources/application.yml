server:
  port: 8080

app:
  name: bitcoin
  isCloud: false

aws:
  profile: default
  region: us-east-1
  dynamodb:
    endpoint: http://localhost:4566
  ses:
    config:
      from: mlex.alba@gmail.com
      to: mlex.alba@gmail.com

analytics:
  elementsInTheMiddle: 5

# ---------------------------------------------------------------
# Stock data configuration
#
# Switch between fake and real data:
#   use-real: false  → generates random fake data every 1s (default, no API key needed)
#   use-real: true   → calls the configured provider every 12s (set the API key below)
#
# Provider options: finnhub, alphavantage, iex, twelvedata
# ---------------------------------------------------------------
stock:
  data:
    use-real: false
    provider: finnhub
  providers:
    alphavantage:
      api-key: ${ALPHAVANTAGE_API_KEY:}
      base-url: https://www.alphavantage.co/query
      rate-limit: 5
    finnhub:
      api-key: ${FINNHUB_API_KEY:}
      base-url: https://finnhub.io/api/v1
      rate-limit: 60
    iex:
      api-key: ${IEX_API_KEY:}
      base-url: https://cloud.iexapis.com/stable
      rate-limit: 100
    twelvedata:
      api-key: ${TWELVEDATA_API_KEY:}
      base-url: https://api.twelvedata.com
      rate-limit: 33

spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: trading-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Kafka topic names
kafka:
  topic:
    stock-data: stock-data

trading:
  api:
    base-path: /api/trading
    event-endpoint: /event
    events-endpoint: /events
    events-content-type: text/event-stream
    allowed-origins: http://localhost:3000
  rate-limiting:
    enabled: true
    requests-per-minute: ${stock.providers.${stock.data.provider}.rate-limit}