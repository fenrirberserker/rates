server:
  port: 8080

app:
  name: bitcoin
  isCloud: false

# ---------------------------------------------------------------
# AWS configuration
#
# isCloud: false → all clients point to LocalStack at localstack.endpoint
# isCloud: true  → all clients point to real AWS
# ---------------------------------------------------------------
aws:
  profile: default
  region: us-east-1
  localstack:
    endpoint: http://localhost:4566
  ses:
    config:
      from: mlex.alba@gmail.com
      to: mlex.alba@gmail.com
  sns:
    topic:
      name: BTCValue
      local-arn: arn:aws:sns:us-east-1:000000000000:BTCValue
      remote-arn: arn:aws:sns:us-east-1:912614154447:BTCValue

# ---------------------------------------------------------------
# BTC / blockchain.info
# ---------------------------------------------------------------
btc:
  provider:
    url: https://blockchain.info/tobtc

# ---------------------------------------------------------------
# Analytics
# ---------------------------------------------------------------
analytics:
  elements-in-the-middle: 5
  sample-file: samples/sample-bullish1.json

# ---------------------------------------------------------------
# Stock data configuration
#
# use-real: false → fake random data, no API key needed (default)
# use-real: true  → calls the configured provider (set API key below)
#
# symbols: list of stock symbols to track
#
# interval:
#   fake-seconds  → how often fake data is generated
#   real-seconds  → how often the real provider is called
#                   (keep >= 60 / rate-limit to avoid throttling)
#
# fake: controls the random data generator ranges
#   base-price-min   → floor of the random base price
#   base-price-range → added random range above the floor
#   price-variation  → max random delta for high/low from base
#   ohlc-variation   → max random delta for open/close from base
#   volume-min       → minimum generated volume
#   volume-range     → added random range above volume-min
#
# sink-buffer-size: max buffered events per SSE subscriber
#   before backpressure drops events for slow clients
#
# provider options: finnhub, alphavantage, iex, twelvedata
# ---------------------------------------------------------------
stock:
  data:
    use-real: false
    provider: finnhub
    symbols:
      - AAPL
      - GOOGL
      - MSFT
      - TSLA
      - AMZN
    interval:
      real-seconds: 12
      fake-seconds: 1
    fake:
      base-price-min: 100.0
      base-price-range: 400.0
      price-variation: 10.0
      ohlc-variation: 5.0
      volume-min: 1000
      volume-range: 10000
    sink-buffer-size: 1000
  providers:
    alphavantage:
      api-key: ${ALPHAVANTAGE_API_KEY:}
      base-url: https://www.alphavantage.co/query
      rate-limit: 5
    finnhub:
      api-key: ${FINNHUB_API_KEY:}
      base-url: https://finnhub.io/api/v1
      rate-limit: 60
    iex:
      api-key: ${IEX_API_KEY:}
      base-url: https://cloud.iexapis.com/stable
      rate-limit: 100
    twelvedata:
      api-key: ${TWELVEDATA_API_KEY:}
      base-url: https://api.twelvedata.com
      rate-limit: 33

spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: trading-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Kafka topic names
kafka:
  topic:
    stock-data: stock-data

trading:
  api:
    base-path: /api/trading
    event-endpoint: /event
    events-endpoint: /events
    event-type: stock-update
    events-content-type: text/event-stream
    allowed-origins: http://localhost:3000
  rate-limiting:
    enabled: true
    requests-per-minute: ${stock.providers.${stock.data.provider}.rate-limit}